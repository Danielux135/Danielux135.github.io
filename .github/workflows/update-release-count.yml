name: Update SoundCloud Release Count

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run update script
        env:
          SOUNDCLOUD_CLIENT_ID: ${{ secrets.SOUNDCLOUD_CLIENT_ID }}
          SOUNDCLOUD_CLIENT_SECRET: ${{ secrets.SOUNDCLOUD_CLIENT_SECRET }}
        run: node .github/scripts/update-release-count.js

      - name: Commit if changed
        run: |
          git config user.name "Danielux135"
          git config user.email "danielux135@gmail.com"
          git diff --quiet || (git add index.html && git commit -m "chore: actualizar número de lanzamientos" && git push)
